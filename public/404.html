<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>The Definition of R&B</title>
    <script>
      // GitHub Pages SPA redirect
      // Encodes the path into a query string so index.html can restore it
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1).join('/') +
        '/?p=' + encodeURIComponent(l.pathname + l.search) +
        (l.hash || '')
      );
    </script>
  </head>
  <body></body>
</html>
